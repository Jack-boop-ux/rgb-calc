<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>图片平均RGB → 代入外层公式计算</title>
  <style>
    :root{
      --teal:#0b7a73;
      --bg:#f6f7fb;
      --card:#fff;
      --text:#0f172a;
      --muted:#6b7280;
      --border:rgba(15,23,42,.12);
      --shadow:0 10px 24px rgba(2,6,23,.06);
      --radius:14px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.45;
    }

    /* 顶部栏 */
    .topbar{
      position:sticky; top:0;
      z-index:10;
      background: linear-gradient(90deg, var(--teal), #0ea5a4);
      color:#fff;
      padding:16px 18px;
      box-shadow: 0 6px 18px rgba(2,6,23,.15);
    }
    .topbar h1{
      margin:0;
      font-size:16px;
      letter-spacing:.2px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .pill{
      display:inline-block;
      padding:4px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.18);
      border:1px solid rgba(255,255,255,.25);
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .container{
      max-width:1200px;
      margin:16px auto 40px;
      padding:0 14px;
    }

    /* 网格：PC四列/手机一列 */
    .grid{
      display:grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap:14px;
    }
    .col-12{ grid-column: span 12; }
    .col-6{ grid-column: span 6; }
    .col-4{ grid-column: span 4; }
    .col-8{ grid-column: span 8; }

    @media (max-width: 980px){
      .col-4, .col-6, .col-8{ grid-column: span 12; }
    }
    @media (max-width: 560px){
      .grid{ gap:12px; }
      .container{ margin-top:12px; }
    }

    /* 卡片 */
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .card-head{
      background: var(--teal);
      color:#fff;
      padding:10px 12px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      font-size:14px;
    }
    .card-body{ padding:14px; }

    .small{ color:var(--muted); font-size:12px; margin-top:6px; }
    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      font-weight:800;
      margin:10px 0 6px;
    }
    input[type="file"]{ width:100%; }
    input[type="text"], textarea{
      width:100%;
      padding:10px 10px;
      border-radius:10px;
      border:1px solid var(--border);
      outline:none;
      background:#fff;
      font-size:14px;
    }
    button{
      width:100%;
      padding:10px 12px;
      border:none;
      border-radius:12px;
      background:#111827;
      color:#fff;
      font-weight:900;
      cursor:pointer;
      margin-top:14px;
      transition: transform .05s ease, opacity .2s ease;
    }
    button:hover{ opacity:.95; }
    button:active{ transform: translateY(1px); }

    /* 输出块 */
    .kvs{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      margin-top:10px;
    }
    .kv{
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px;
      background:#fff;
      min-height:62px;
    }
    .kv .t{ color:var(--muted); font-size:12px; font-weight:900; }
    .kv .v{
      margin-top:6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-weight:1000;
      font-size:14px;
      word-break:break-word;
    }

    /* 图片预览 */
    .preview{
      border-radius:12px;
      border:1px dashed rgba(11,122,115,.35);
      background:rgba(11,122,115,.06);
      padding:10px;
      min-height:220px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    img#preview{
      max-width:100%;
      max-height:420px;
      display:none;
      border-radius:10px;
    }

    .status{
      margin-top:12px;
      font-weight:900;
      border-radius:12px;
      padding:10px 12px;
      border:1px solid var(--border);
      background:#fff;
      color:var(--muted);
      min-height:40px;
      display:flex;
      align-items:center;
    }
    .status.ok{ border-color: rgba(10,122,47,.25); color:#0a7a2f; }
    .status.err{ border-color: rgba(176,0,32,.25); color:#b00020; }

    code{
      background: rgba(2,6,23,.06);
      padding:2px 6px;
      border-radius:8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:12px;
    }
  </style>
</head>

<body>
  <header class="topbar">
    <h1>
      <span>图片平均RGB → 代入外层公式计算</span>
      <span class="pill">nested formula • responsive UI</span>
    </h1>
  </header>

  <main class="container">
    <section class="grid">
      <!-- A：图片输入 -->
      <div class="card col-6">
        <div class="card-head">
          <span>步骤 A：选择图片</span>
          <span class="pill" style="background:rgba(255,255,255,.14)">得到代表值 avgRGB</span>
        </div>
        <div class="card-body">
          <div class="small">
            程序会对图片进行全图遍历，计算有效像素（alpha&gt;0）的平均值：
            <b>avgR、avgG、avgB</b>。
          </div>

          <label for="file">选择纯色/近似纯色图片</label>
          <input type="file" accept="image/*" id="file" />

          <div class="status" id="status">请先选择图片</div>
          <button id="btnCalc" type="button">计算：平均RGB → 代入公式</button>
        </div>
      </div>

      <!-- B：平均RGB输出（只读） -->
      <div class="card col-6">
        <div class="card-head">
          <span>步骤 B：平均 RGB（只读）</span>
          <span class="pill" style="background:rgba(255,255,255,.14)">作为变量输入</span>
        </div>
        <div class="card-body">
          <div class="small">
            这些值会被自动代入你的外层公式中（变量名为 <code>R</code>、<code>G</code>、<code>B</code>）。
          </div>

          <div class="kvs">
            <div class="kv">
              <div class="t">avgR（图片平均）</div>
              <div class="v" id="avgR">—</div>
            </div>
            <div class="kv">
              <div class="t">avgG（图片平均）</div>
              <div class="v" id="avgG">—</div>
            </div>
            <div class="kv">
              <div class="t">avgB（图片平均）</div>
              <div class="v" id="avgB">—</div>
            </div>
            <div class="kv">
              <div class="t">代入后最终结果</div>
              <div class="v" id="out">—</div>
            </div>
          </div>

          <label for="formula">外层公式（用 R/G/B 表示平均值）</label>
          <input type="text" id="formula" value="(R+G+B)/3" />

          <div class="small" style="margin-top:10px;">
            支持：<code>+ - * / ( )</code>，以及 <code>Math.abs</code>、<code>Math.sqrt</code>、<code>Math.log</code>。
          </div>
        </div>
      </div>

      <!-- C：预览 -->
      <div class="card col-12">
        <div class="card-head">
          <span>预览</span>
          <span class="pill" style="background:rgba(255,255,255,.14)">图片显示区</span>
        </div>
        <div class="card-body">
          <div class="preview">
            <img id="preview" alt="preview" />
          </div>
        </div>
      </div>
    </section>
  </main>

<script>
  const fileEl = document.getElementById('file');
  const btnCalc = document.getElementById('btnCalc');
  const preview = document.getElementById('preview');

  const statusEl = document.getElementById('status');
  const avgREl = document.getElementById('avgR');
  const avgGEl = document.getElementById('avgG');
  const avgBEl = document.getElementById('avgB');
  const outEl = document.getElementById('out');
  const formulaEl = document.getElementById('formula');

  let currentImage = null;      // Image element (loaded)
  let currentImageUrl = null;  // object URL for preview

  function setStatus(text, type){
    statusEl.textContent = text;
    statusEl.classList.remove('ok','err');
    if(type === 'ok') statusEl.classList.add('ok');
    if(type === 'err') statusEl.classList.add('err');
  }

  fileEl.addEventListener('change', () => {
    const f = fileEl.files && fileEl.files[0];
    if (!f) return;

    // reset UI
    currentImage = null;
    avgREl.textContent = '—';
    avgGEl.textContent = '—';
    avgBEl.textContent = '—';
    outEl.textContent = '—';
    setStatus('图片加载中…', null);

    // revoke previous URL if any
    if (currentImageUrl) URL.revokeObjectURL(currentImageUrl);

    const url = URL.createObjectURL(f);
    currentImageUrl = url;

    const img = new Image();
    img.onload = () => {
      currentImage = img;
      preview.src = url;
      preview.style.display = 'block';
      setStatus('图片就绪：点击“计算：平均RGB → 代入公式”', 'ok');
    };
    img.onerror = () => setStatus('图片加载失败，请换一张再试', 'err');
    img.src = url;
  });

  function computeAvgRGB(img) {
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth || img.width;
    canvas.height = img.naturalHeight || img.height;

    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(img, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;

    let sumR = 0, sumG = 0, sumB = 0, count = 0;

    // 遍历像素，忽略全透明像素（alpha<=0）
    for (let i = 0; i < data.length; i += 4) {
      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];
      const a = data[i + 3];

      if (a > 0) {
        sumR += r; sumG += g; sumB += b; count++;
      }
    }

    if (count === 0) return { avgR: 0, avgG: 0, avgB: 0 };

    return {
      avgR: sumR / count,
      avgG: sumG / count,
      avgB: sumB / count
    };
  }

  function safeEvalFormula(expr, vars) {
    // 变量只提供 R/G/B + Math
    const { R, G, B } = vars;
    const fn = new Function('R', 'G', 'B', 'Math', `return (${expr});`);
    return fn(R, G, B, Math);
  }

  btnCalc.addEventListener('click', () => {
    setStatus('', null);

    if (!currentImage) {
      setStatus('请先选择图片', 'err');
      return;
    }

    const formula = (formulaEl.value || '').trim();
    if (!formula) {
      setStatus('请先输入外层公式', 'err');
      return;
    }

    try {
      // 1) 内层：图片平均 RGB
      const { avgR, avgG, avgB } = computeAvgRGB(currentImage);

      avgREl.textContent = avgR.toFixed(4);
      avgGEl.textContent = avgG.toFixed(4);
      avgBEl.textContent = avgB.toFixed(4);

      // 2) 外层：把平均值代入用户公式
      const result = safeEvalFormula(formula, { R: avgR, G: avgG, B: avgB });

      if (typeof result !== 'number' || !isFinite(result)) {
        outEl.textContent = '—';
        setStatus('公式结果无效（可能除0/对负数做 sqrt/log 等）', 'err');
        return;
      }

      outEl.textContent = result.toFixed(6);
      setStatus('计算成功：已完成“平均RGB → 代入公式”', 'ok');
    } catch (e) {
      outEl.textContent = '—';
      setStatus('公式解析失败：请检查括号/运算/变量（变量名必须是 R/G/B）', 'err');
    }
  });
</script>
</body>
</html>
